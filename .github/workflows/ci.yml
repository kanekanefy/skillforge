name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS-latest covers the typical dev/install path for Claude Code users;
        # ubuntu-latest covers headless CI environments.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests
        continue-on-error: true   # advisory only for now; promote to error later

      - name: Run tests
        run: pytest tests -v

      - name: Smoke-test CLI
        run: |
          export SKILLFORGE_HOME=$RUNNER_TEMP/sf-ci-home
          sf db init
          sf seed
          sf list
          sf doctor
          sf evolver doctor
          sf metrics show

  smoke-install-sh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Run installer (local mode — `pwd` is the checkout)
        run: |
          ./install.sh
          which sf
          sf --version
